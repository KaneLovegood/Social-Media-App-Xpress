name: Deploy Backend to EC2 (Dev)

on:
  push:
    branches:
      - dev
    paths:
      - "xpress-backend/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: xpress-backend

    steps:
      # 1. Checkout source
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. Setup pnpm v9
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate

      # 4. Cache pnpm store
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('xpress-backend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # 5. Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 6. Build project on GitHub runner
      - name: Build project
        run: NODE_OPTIONS="--max-old-space-size=512" pnpm build

      # 7. Setup SSH
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BACKEND_EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.BACKEND_EC2_HOST }} >> ~/.ssh/known_hosts

      # 8. Upload build files to EC2
      - name: Upload files to EC2
        run: |
          rsync -avz --delete \
            dist \
            prisma \
            package.json \
            pnpm-lock.yaml \
            ecosystem.config.js \
            ${{ secrets.BACKEND_EC2_USER }}@${{ secrets.BACKEND_EC2_HOST }}:/home/ubuntu/xpress-backend/

      # 9. Restart backend on EC2
      - name: Restart backend on EC2
        run: |
          ssh ${{ secrets.BACKEND_EC2_USER }}@${{ secrets.BACKEND_EC2_HOST }} << 'EOF'

            set -e

            echo "📂 Move to backend"
            cd /home/ubuntu/xpress-backend

            echo "📦 Setup pnpm"
            corepack enable || true
            corepack prepare pnpm@9.15.9 --activate

            echo "📥 Install production dependencies"
            pnpm install --prod --frozen-lockfile

            echo "♻️ Restart PM2"

            pm2 restart xpress-backend \
              || pm2 start dist/src/main.js --name xpress-backend

            echo "💾 Save PM2 state"
            pm2 save

            echo "✅ Deploy completed"

          EOF