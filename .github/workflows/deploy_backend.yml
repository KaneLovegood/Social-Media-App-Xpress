name: Deploy Backend to EC2 with Docker (Optimized)

on:
  push:
    branches:
      - main
    paths:
      - 'xpress-backend/**'
      - '.github/workflows/deploy_backend.yml'

jobs:
  test:
    name: Test Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./xpress-backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Linter (Non-blocking)
        run: pnpm lint
        continue-on-error: true

      - name: Run Tests
        run: |
          if pnpm run | grep -q "test"; then
            pnpm test
          else
            echo "No test script found, skipping tests."
          fi

  build-and-push:
    name: Build and Push Docker Image
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./xpress-backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/xpress-backend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/xpress-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/xpress-backend:buildcache,mode=max

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BACKEND_EC2_HOST }}
          username: ${{ secrets.BACKEND_EC2_USER }}
          key: ${{ secrets.BACKEND_EC2_SSH_KEY }}
          script: |
            set -e

            echo "=== REMOVE UNUSED IMAGES ==="
            sudo docker image prune -af || true

            echo "=== PULL IMAGE ==="
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/xpress-backend:latest

            echo "=== STOP OLD CONTAINER ==="
            sudo docker stop xpress-backend || true
            sudo docker rm xpress-backend || true

            echo "=== START NEW CONTAINER ==="
            sudo docker run -d \
              --name xpress-backend \
              --restart unless-stopped \
              -p 8080:3000 \
              --env-file /home/${{ secrets.BACKEND_EC2_USER }}/xpress-backend/.env \
              ${{ secrets.DOCKERHUB_USERNAME }}/xpress-backend:latest

            echo "=== CLEANUP ==="
            sudo docker container prune -f || true
            sudo docker image prune -af || true
            sudo docker builder prune -af || true

            echo "=== RUNNING CONTAINERS ==="
            sudo docker ps

            echo "=== DISK USAGE ==="
            df -h