name: Deploy Backend to EC2

on:
  push:
    branches:
      - dev
    paths:
      - "xpress-backend/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup SSH
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BACKEND_EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan -H ${{ secrets.BACKEND_EC2_HOST }} >> ~/.ssh/known_hosts

      # 3. Deploy
      - name: Deploy to EC2
        run: |

          ssh ${{ secrets.BACKEND_EC2_USER }}@${{ secrets.BACKEND_EC2_HOST }} << 'EOF'

            set -e

            echo "📂 Move to project root"
            cd /home/ubuntu/New-Technology-Xpress

            echo "⬇️ Pull latest code"
            git pull origin dev

            echo "📂 Move to backend"
            cd xpress-backend

            echo "📥 Install dependencies"
            corepack enable || true

            export HUSKY=0

            pnpm install --frozen-lockfile --ignore-scripts=false

            echo "🏗️ Build backend"
            pnpm build

            echo "♻️ Restart PM2"
            pm2 restart xpress-backend

            echo "💾 Save PM2"
            pm2 save

            echo "✅ Deploy success"

          EOF