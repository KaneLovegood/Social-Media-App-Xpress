name: Deploy Backend to EC2 (Dev)

on:
  push:
    branches:
      - dev
    paths:
      - '.github/workflows/deploy_backend.yml'
      - 'xpress-backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: xpress-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -t xpress-backend:${{ github.sha }} \
            -f xpress-backend/Dockerfile \
            xpress-backend

      - name: Package Docker image
        run: |
          mkdir -p /tmp/xpress-backend-artifacts
          docker save xpress-backend:${{ github.sha }} | gzip > /tmp/xpress-backend-artifacts/xpress-backend-${{ github.sha }}.tar.gz

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BACKEND_EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.BACKEND_EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare EC2 directory
        run: |
          ssh ${{ secrets.BACKEND_EC2_USER }}@${{ secrets.BACKEND_EC2_HOST }} "mkdir -p /home/ubuntu/xpress-backend/releases"

      - name: Upload image to EC2
        run: |
          scp /tmp/xpress-backend-artifacts/xpress-backend-${{ github.sha }}.tar.gz \
            ${{ secrets.BACKEND_EC2_USER }}@${{ secrets.BACKEND_EC2_HOST }}:/home/ubuntu/xpress-backend/releases/

      - name: Load image and restart Docker container
        run: |
          ssh ${{ secrets.BACKEND_EC2_USER }}@${{ secrets.BACKEND_EC2_HOST }} << 'EOF'

            set -e

            IMAGE_TAG='${{ github.sha }}'
            RELEASE_DIR='/home/ubuntu/xpress-backend/releases'
            IMAGE_FILE="${RELEASE_DIR}/xpress-backend-${IMAGE_TAG}.tar.gz"

            gunzip -c "$IMAGE_FILE" | docker load
            rm -f "$IMAGE_FILE"

            docker stop xpress-backend || true
            docker rm xpress-backend || true

            docker run -d \
              --name xpress-backend \
              --restart unless-stopped \
              -p 3000:3000 \
              --env-file /home/ubuntu/xpress-backend/.env \
              xpress-backend:${IMAGE_TAG}

            echo "✅ Deploy completed"

          EOF